<div class="ip-backdrop" [class.ip-active]="visible" (click)="onBackdropClick($event)">

  <!-- Barra superior: nombre a la izquierda, botón cerrar a la derecha -->
  <div class="ip-topbar">
    <span class="ip-title">
      <svg class="ip-title-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
      {{ imageTitle }}
    </span>

    <button class="ip-close" (click)="closed.emit()" aria-label="Cerrar previsualización">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>

  <!-- Imagen centrada -->
  <div class="ip-image-wrapper" (click)="onBackdropClick($event)">
    <img [src]="imageUrl" [alt]="imageTitle" class="ip-image" (click)="$event.stopPropagation()" />
  </div>

</div>
